name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository == 'apotapovax/any-download'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Read app version
        id: version
        run: |
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | sed -E 's/.*versionCode = ([0-9]+).*/\1/')
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed -E 's/.*versionName = "([^"]+)".*/\1/')
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Missing ANDROID_KEYSTORE_BASE64 repository secret." >&2
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
          chmod 600 release.keystore
          echo "ANDROID_KEYSTORE_PATH=$PWD/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --quiet

      - name: Locate release APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' ! -name '*-unsigned.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "No signed release APK found. Check signing secrets." >&2
            exit 1
          fi
          cp "$APK" AnyDownload-arm64-v8a.apk
          echo "path=$PWD/AnyDownload-arm64-v8a.apk" >> "$GITHUB_OUTPUT"

      - name: Verify APK signature
        run: |
          BUILD_TOOLS="${ANDROID_HOME}/build-tools/$(ls -1 "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          "$BUILD_TOOLS/apksigner" verify --print-certs AnyDownload-arm64-v8a.apk | head -5

      - name: Create update metadata
        run: |
          VERSION_CODE="${{ steps.version.outputs.code }}"
          VERSION_NAME="${{ steps.version.outputs.name }}"
          jq -n \
            --argjson versionCode "$VERSION_CODE" \
            --arg versionName "$VERSION_NAME" \
            '{
              versionCode: $versionCode,
              versionName: $versionName,
              apkAssetName: "AnyDownload-arm64-v8a.apk",
              minSdk: 26
            }' > update-metadata.json
          cat update-metadata.json

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=v${{ steps.version.outputs.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Any Download v${{ steps.version.outputs.name }}
          generate_release_notes: true
          files: |
            AnyDownload-arm64-v8a.apk
            update-metadata.json

      - name: Remove signing material
        if: always()
        run: rm -f release.keystore
